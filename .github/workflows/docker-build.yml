name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Image Tag
        id: vars
        run: |
          if [[ "${GITHUB_REF##*/}" == "main" ]]; then
            echo "TAG=latest" >> $GITHUB_OUTPUT
          else
            echo "TAG=develop" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Backend Image
        run: docker build -t jayanthroyal/social-backend:${{ steps.vars.outputs.TAG }} ./backend

      - name: Build Frontend Image
        run: docker build -t jayanthroyal/social-frontend:${{ steps.vars.outputs.TAG }} ./frontend

      - name: Push Backend Image
        run: docker push jayanthroyal/social-backend:${{ steps.vars.outputs.TAG }}

      - name: Push Frontend Image
        run: docker push jayanthroyal/social-frontend:${{ steps.vars.outputs.TAG }}