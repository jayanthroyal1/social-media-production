name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Backend Image
        run: docker build -t jayanthroyal/social-backend:latest ./backend

      - name: Build Frontend Image
        run: docker build -t jayanthroyal/social-frontend:latest ./frontend

      - name: Push Backend Image
        run: docker push jayanthroyal/social-backend:latest

      - name: Push Frontend Image
        run: docker push jayanthroyal/social-frontend:latest